spring.application.name=shivamai-ai-testpilot

server.port=8080

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5:1.5b
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.num-ctx=2048

logging.level.root=INFO

logging.level.com.shivamai.systems=DEBUG

logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger - %msg%n